<div class="h-full w-full flex flex-col flex-auto bg-x-blue-900">
    <!-- Header -->
    <div class="relative h-16 w-full flex justify-center items-center">
        <img [ngClass]="{'small': (!openS() && mobileS())}" src="/icon.svg" alt="logo">
        @if (openS() && mobileS()) {
            <button class="!absolute top-1 right-1" mat-icon-button
                (click)="close()">
                <mat-icon svgIcon="heroicons_outline:x-mark"></mat-icon>
            </button>
        }
    </div>
    @if ((!mobileS() && openS()) || mobileS()) {
        <!-- Body -->
        <div class="flex flex-col flex-auto justify-between pt-5 pb-8">
            <!-- Navigation Items -->
            <div class="flex flex-col gap-y-3 p-1">
                @for (item of itemsS(); track item.id) {
                    <a class="h-12 flex items-center justify-center gap-x-3 text-white px-4 rounded-lg"
                        (click)="selectItem(item.id)"
                        [routerLink]="[item.link]"
                        [ngClass]="{
                            'bg-x-blue-500 cursor-default': selectedItemS() === item.id,
                            'hover:text-x-blue-500': selectedItemS() !== item.id
                        }">
                        <mat-icon class="w-2/12" 
                            [ngClass]="{'big': mobileS() && !openS()}" 
                            [svgIcon]="item.icon || ''">
                        </mat-icon>
                        @if (!mobileS() || (mobileS() && openS())){
                            <span class="w-24 text-lg font-medium">{{item.title}}</span>
                        }
                    </a>
                }
            </div>
            @if (itemsS.length) {
                <mat-divider></mat-divider>
            }
            <!-- Static  Items -->
            <div class="mt-10">
                <a class="h-12 flex items-center justify-center gap-x-3 text-white px-4 rounded-lg"
                    (click)="selectItem('settings')"
                    [routerLink]="['/settings']"
                    [ngClass]="{
                        'bg-x-blue-500 cursor-default': selectedItemS() === 'settings',
                        'hover:text-x-blue-500': selectedItemS() !== 'settings'
                    }">
                    <mat-icon class="w-2/12" 
                        [ngClass]="{'big': mobileS() && !openS()}" 
                        svgIcon="heroicons_outline:cog-6-tooth">
                    </mat-icon>
                    @if (!mobileS() || (mobileS() && openS())){
                        <span class="w-6/12 ml-5 text-lg font-medium">Settings</span>
                    }
                </a>
            </div>
        </div>
    }
</div>
